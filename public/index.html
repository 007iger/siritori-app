<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>しりとり</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <h1>しりとり</h1>

    <p id="previousWord">前の単語を読み込み中です</p>

    <p id="message"></p>

    <div id="inputArea">
      <input id="nextWordInput" type="text" placeholder="次の単語を入力" />

      <button id="nextWordSendButton">送信</button>
      <button id="resetSendButton">リセット</button>
    </div>

    <section>
      <h2>単語の履歴</h2>
      <ol id="wordHistoryList"></ol>
    </section>
  </main>

  <script>
    const previousWordParagraph =
      document.querySelector("#previousWord");

    const messageParagraph =
      document.querySelector("#message");

    const nextWordInput =
      document.querySelector("#nextWordInput");

    const nextWordSendButton =
      document.querySelector("#nextWordSendButton");

    const resetSendButton =
      document.querySelector("#resetSendButton");

    const wordHistoryList =
      document.querySelector("#wordHistoryList");

    // 履歴を画面に表示する
    function displayWordHistories(wordHistories) {
      wordHistoryList.innerHTML = "";

      for (const word of wordHistories) {
        const listItem = document.createElement("li");
        listItem.textContent = word;
        wordHistoryList.appendChild(listItem);
      }
    }

    // ゲーム状態に応じて入力可否を変更
    function updateInputState(gameOver) {
      nextWordInput.disabled = gameOver;
      nextWordSendButton.disabled = gameOver;
    }

    // サーバーから現在の状態を取得
    async function loadGameState() {
      const response = await fetch("/shiritori", {
        method: "GET",
      });

      const responseJson = await response.json();

      previousWordParagraph.textContent =
        `前の単語: ${responseJson.previousWord}`;

      displayWordHistories(responseJson.wordHistories);
      updateInputState(responseJson.gameOver);
    }

    // ページ表示時
    window.onload = async () => {
      await loadGameState();
      nextWordInput.focus();
    };

    // 送信ボタン
    nextWordSendButton.onclick = async () => {
      const nextWordInputText = nextWordInput.value;

      const response = await fetch("/shiritori", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          nextWord: nextWordInputText,
        }),
      });

      const responseJson = await response.json();

      // エラー時
      if (response.status !== 200) {
        messageParagraph.textContent =
          responseJson.errorMessage;

        if (responseJson.previousWord) {
          previousWordParagraph.textContent =
            `最後の単語: ${responseJson.previousWord}`;
        }

        if (responseJson.wordHistories) {
          displayWordHistories(responseJson.wordHistories);
        }

        if (responseJson.gameOver) {
          updateInputState(true);
        }

        return;
      }

      // 正常時
      previousWordParagraph.textContent =
        `前の単語: ${responseJson.previousWord}`;

      messageParagraph.textContent = "";

      displayWordHistories(responseJson.wordHistories);

      nextWordInput.value = "";
      nextWordInput.focus();
    };

    // リセットボタン
    resetSendButton.onclick = async () => {
      const response = await fetch("/reset", {
        method: "POST",
      });

      const responseJson = await response.json();

      previousWordParagraph.textContent =
        `前の単語: ${responseJson.previousWord}`;

      messageParagraph.textContent = "";

      displayWordHistories(responseJson.wordHistories);

      nextWordInput.value = "";

      updateInputState(false);

      nextWordInput.focus();
    };

    // Enterキーでも送信
    nextWordInput.addEventListener("keydown", (event) => {
      if (
        event.key === "Enter" &&
        !nextWordSendButton.disabled
      ) {
        nextWordSendButton.click();
      }
    });
  </script>
</body>

</html>
